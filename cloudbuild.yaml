steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$BUILD_ID', '-t', 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest', '.']
    id: 'Build Docker Image'

  # 2. Push the container image to Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$BUILD_ID']
    id: 'Push Docker Image'
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest']
    id: 'Push Latest Image'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$BUILD_ID'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      - '--no-allow-unauthenticated'
      - '--ingress'
      - 'internal'
      - '--max-instances'
      - '50'
      - '--concurrency'
      - '1'
      - '--memory'
      - '4Gi'
      - '--timeout'
      - '3600'
      - '--no-cpu-throttling'
      - '--min-instances'
      - '0'
      - '--network'
      - 'projects/vpc-host-nonprod-lv367-or671/global/networks/vpc-noprod-shared'
      - '--subnet'
      - 'projects/vpc-host-nonprod-lv367-or671/regions/southamerica-east1/subnetworks/subnet-non-prod-1'
      - '--set-env-vars=GOOGLE_GENAI_USE_VERTEXAI=true,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=global'
      - '--set-secrets=DB_PASSWORD=db-password:latest,DB_HOST=db-host:latest,DB_USER=db-user:latest,DB_NAME=db-name:latest'
      - '--vpc-egress=private-ranges-only'
    id: 'Deploy to Cloud Run'

substitutions:
  _SERVICE_NAME: swiss-auditor-worker
  _REGION: southamerica-east1

images:
  - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest'
