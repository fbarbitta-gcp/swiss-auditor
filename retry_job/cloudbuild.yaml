steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/$_JOB_NAME:$BUILD_ID', '-t', 'gcr.io/$PROJECT_ID/$_JOB_NAME:latest', '.']
    id: 'Build Docker Image'

  # 2. Push the container image to Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/$_JOB_NAME:$BUILD_ID']
    id: 'Push Docker Image'
  
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/$_JOB_NAME:latest']
    id: 'Push Latest Image'

  # 3. Update the Cloud Run Job
  # Note: The Job must already exist via Terraform
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - '$_JOB_NAME'
      - '--image'
      - 'gcr.io/$PROJECT_ID/$_JOB_NAME:$BUILD_ID'
      - '--region'
      - '$_REGION'
      - '--network'
      - 'projects/vpc-host-nonprod-lv367-or671/global/networks/vpc-noprod-shared'
      - '--subnet'
      - 'projects/vpc-host-nonprod-lv367-or671/regions/southamerica-east1/subnetworks/subnet-non-prod-1'
      - '--vpc-egress=private-ranges-only'
      - '--set-env-vars=BUCKET_NAME=liquidacionesraw'
    id: 'Update Cloud Run Job'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _JOB_NAME: swiss-auditor-worker-retry
  _REGION: southamerica-east1

images:
  - 'gcr.io/$PROJECT_ID/$_JOB_NAME:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/$_JOB_NAME:latest'
